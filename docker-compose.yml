version: '3.8'
services:
  bot:
    build: .
    container_name: telegram-media-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
    environment:
      - TZ=UTC
      - RENDER_DEPLOYMENT=false
    ports:
      - "8000:8000"  # For health check
