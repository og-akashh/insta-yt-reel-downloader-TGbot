services:
  - type: worker
    name: telegram-media-bot
    runtime: python
    buildCommand: |
      apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: python -m src.bot
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DELETE_AFTER_MINUTES
        value: 20
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: LOG_LEVEL
        value: INFO
